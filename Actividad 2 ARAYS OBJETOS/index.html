<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automotores</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="contenedor">

    <h1>Presupuestos Automotores</h1>

    <form id="formPresupuesto">

        <label>Nombre</label>
        <input type="text" id="nombre" required>

        <label>Apellido</label>
        <input type="text" id="apellido" required>

        <label>Vehículo</label>
        <select id="vehiculo"></select>

        <button type="submit">Generar Presupuesto</button>

    </form>

    <h2>Presupuestos Realizados</h2>

    <table>
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Vehículo</th>
                <th>Precio</th>
                <th>IVA</th>
                <th>Contado</th>
                <th>Interés</th>
                <th>Precio Final</th>
                <th>24 Cuotas</th>
                <th>36 Cuotas</th>
            </tr>
        </thead>

        <tbody id="tablaPresupuestos"></tbody>

    </table>

    <hr>

    <h2>Buscar Vehículos de un Cliente</h2>

    <input type="text" id="buscarCliente">

    <button onclick="buscarCliente()">
        Buscar
    </button>

    <div id="resultadoCliente"></div>

    <hr>

    <h2>Vehículos con precio superior a:</h2>

    <input type="number" id="precioFiltro">

    <button onclick="buscarPrecio()">
        Buscar
    </button>

    <div id="resultadoPrecio"></div>

</div>

<script src="repuestos.js"></script>

</body>
</html>
